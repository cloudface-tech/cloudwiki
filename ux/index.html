<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/_site/favicon" />
    <meta name="format-detection" content="telephone=no">
    <meta name="msapplication-tap-highlight" content="no">
    <meta name="viewport" content="initial-scale=1, width=device-width">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="CloudWiki">
    <meta name="theme-color" content="#1976D2">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="apple-touch-icon" href="/favicon.svg">
    <title>CloudWiki</title>
    <!--preload-links-->
    <!-- Inter font loaded via @font-face in _base.scss -->
    <style type="text/css">
      @keyframes initspinner {
        to { transform: rotate(360deg); }
      }

      .init-loading {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(255,255,255,.75);
        z-index: 2000000000;
        backdrop-filter: blur(10px);
      }

      .body--dark .init-loading {
        background-color: rgba(0,0,0,.75);
      }

      .init-loading:before {
        content: '';
        box-sizing: border-box;
        position: absolute;
        top: 50%;
        left: 50%;
        width: 50px;
        height: 50px;
        margin-top: -25px;
        margin-left: -25px;
        border-radius: 50%;
        border-top: 2px solid #00C2FF;
        border-right: 2px solid transparent;
        animation: initspinner .6s linear infinite;
        z-index: 2000000000;
      }
    </style>

    <noscript>
      <style type="text/css">
        .init-loading {
          display: none !important;
        }

        .q-drawer-container {
          display: none !important;
        }

        .scroll.relative-position {
          position: static !important;
        }

        .scroll.relative-position > .absolute {
          position: relative !important;
        }
      </style>
    </noscript>
  </head>
  <body class="cloudwiki-root">
    <div class="init-loading"></div>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
