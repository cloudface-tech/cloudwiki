services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    volumes:
      - db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DB_USER:-cloudwiki}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME:-cloudwiki}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-cloudwiki}"]
      interval: 10s
      timeout: 5s
      retries: 5

  cloudwiki:
    image: ghcr.io/cloudface-tech/cloudwiki:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_TYPE: postgres
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-cloudwiki}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME:-cloudwiki}
    volumes:
      - wiki-data:/wiki/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - cloudwiki

volumes:
  db-data:
  wiki-data:
  caddy-data:
  caddy-config:
